<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student Performance Dashboard</h1>
            <div class="upload-section">
                <input type="file" id="csvFileInput" accept=".csv" hidden>
                <button class="btn btn-primary" onclick="document.getElementById('csvFileInput').click()">Upload CSV</button>
                <span id="fileName">No file chosen</span>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="card">
                <h3>Total Students</h3>
                <p id="totalStudents">-</p>
            </div>
            <div class="card">
                <h3>Average Marks</h3>
                <p id="averageMarks">-</p>
            </div>
            <div class="card card-highlight">
                <h3>Top Performer</h3>
                <p id="topPerformer">-</p>
            </div>
        </div>

        <!-- Filters & Sorting -->
        <div class="controls">
            <div class="filter-group">
                <label>Category:</label>
                <select id="categoryFilter">
                    <option value="All">All Categories</option>
                    <option value="Excellent">Excellent (>80)</option>
                    <option value="Good">Good (60-80)</option>
                    <option value="Needs Improvement">Needs Improvement (<60)</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Min Marks:</label>
                <input type="number" id="minMarks" placeholder="0" min="0" max="100">
            </div>
            <div class="filter-group">
                <label>Sort By Marks:</label>
                <select id="sortOrder">
                    <option value="none">None</option>
                    <option value="desc">Highest First</option>
                    <option value="asc">Lowest First</option>
                </select>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-container">
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Marks</th>
                        <th>Category</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
